name: Build iOS App

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Package
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version
        run: |
          VERSION=$(awk -F'=' '/^[[:space:]]*VERSION[[:space:]]*=/ {gsub(/[[:space:]]/,"",$2); print $2; exit}' Config.xcconfig)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install Dependencies
        run: |
          set -e

          # Packages we desperately need
          brew install ldid dpkg libarchive

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-${{ runner.os }}-v1

      - name: Install Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e

          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      - name: Setup
        run: |
          set -e

          # Setting TheOS stuff up
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      - name: Download LLVM Support
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p llvm-support-release
          gh release download llvm-support \
            --pattern 'CoreCompilerSupportLibs.tar.gz.part-*' \
            --pattern 'CoreCompilerSupportLibs.tar.gz.sha256' \
            --dir llvm-support-release
          cat llvm-support-release/CoreCompilerSupportLibs.tar.gz.part-* > CoreCompilerSupportLibs.tar.gz
          shasum -a 256 -c llvm-support-release/CoreCompilerSupportLibs.tar.gz.sha256
          tar -xzf CoreCompilerSupportLibs.tar.gz
          rm -rf CoreCompiler/CoreCompilerSupportLibs
          mkdir -p CoreCompiler/CoreCompilerSupportLibs
          cp -R CoreCompilerSupportLibs/. CoreCompiler/CoreCompilerSupportLibs/
          cp -R LLVM.xcframework CoreCompiler/CoreCompilerSupportLibs/LLVM.xcframework

      - name: Build Jailed
        timeout-minutes: 1200
        run: |
          set -e

          # Build the project (jailed)
          CHECK_DEPS=0 make jailed

      - name: Upload Jailed
        uses: actions/upload-artifact@v4
        with:
          name: SuCode.ipa
          path: SuCode.ipa
